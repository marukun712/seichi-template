<!doctype html>
<html lang="ja" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet" />

  <style>
    * {
      font-family: "Noto Sans JP", sans-serif;
    }

    body {
      margin: 0;
    }
  </style>

  <title>Seichi Template</title>
</head>

<body x-data="app">
  <header-component x-bind:title="data?.title ?? ''" x-bind:color="data?.color ?? '#5594c3'"
    x-bind:spots="JSON.stringify(data?.spots ?? [])">
  </header-component>

  <main class="container">
    <template x-if="error">
      <article x-text="error"></article>
    </template>

    <template x-if="data">
      <div>
        <section>
          <p x-text="data.about"></p>
        </section>

        <section>
          <div x-init="initMap($el)" style="height: 600px; border-radius: var(--pico-border-radius); overflow: hidden;">
          </div>
        </section>

        <footer-component x-bind:author="data.author" x-bind:links="JSON.stringify(data.links)">
        </footer-component>
      </div>
    </template>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
